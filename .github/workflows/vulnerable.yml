name: Greeter (fixed)
on:
  issues:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Hello
        env:
          TITLE: ${{ github.event.issue.title }}
          AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          echo "Nouvelle issue reçue !"
          echo "Titre : $TITLE"
          echo "Auteur : $AUTHOR"
